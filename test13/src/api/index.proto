syntax = "proto3";

package index;

service IndexService {
  rpc GetData (GetRequest) returns (GetResponse);
  rpc GetFootballer23 (GetFootballerRequest) returns (GetFootballerResponse);
}

service SportsService23 {
    rpc GetChessPlayers (chessPlayersReq11) returns (chessPlayersResp11);
}

service StreamService23 {
  rpc StreamFootballerLive (GetFootballerRequest) returns (stream GetFootballerResponse);
  rpc UploadMatchStats (stream StatPayload) returns (UploadSummary);
  rpc LiveMatchChat (stream ChatMessage) returns (stream ChatMessage);
}

/* ========================================== */
/* Unary Messages                             */
/* ========================================== */

message GetRequest {
  string id = 1;
}

message GetResponse {
  string id = 1;
  string name = 2;
  string description = 3;
}

message GetFootballerRequest {
  string id = 1;
}

message GetFootballerResponse {
  string id = 1;
  string playerName = 2;
  string position = 3;
}

/* ========================================== */
/* Chess / Sports Messages                    */
/* ========================================== */

message chessPlayersReq11 {
  string desamu = 1;
  optional int32 limit11 = 2; 
}

message chessPlayer45 {
  optional string id = 1;
  string name22 = 2;
  string country22 = 3;
  bool is_active = 4;
}

message chessPlayersResp11 {
  bool success23 = 1;
  repeated chessPlayer45 data11 = 2; // Fixed tag sequence to 2
  optional int32 totalCount33 = 3;   // Fixed tag sequence to 3
}

/* ========================================== */
/* New Streaming Messages (Fixed the Crash!)  */
/* ========================================== */

message StatPayload {
  string matchId = 1;
  string statType = 2;
  int32 value = 3;
}

message UploadSummary {
  bool success = 1;
  int32 totalChunksProcessed = 2;
  repeated StatPayload allPayloads = 3;         // repeated is already optional; no need to add it again
}

message ChatMessage {
  string user = 1;
  string text = 2;
  string timestamp = 3;
}
